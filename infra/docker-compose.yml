services:
  redis:
    image: redis:8.4-alpine
    container_name: tumlumtala-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "26379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    networks:
      - tumlumtala-net

  rabbitmq:
    image: rabbitmq:4.1-alpine
    container_name: tumlumtala-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "25672:5672"  
      - "25673:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - tumlumtala-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: tumlumtala-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "29090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tumlumtala-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: tumlumtala-loki
    command: "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "23100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - tumlumtala-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tumlumtala-promtail
    command: "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - tumlumtala-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.0
    container_name: tumlumtala-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "23000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - tumlumtala-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: tumlumtala-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "24317:4317"
      - "24318:4318"
    networks:
      - tumlumtala-net
    restart: unless-stopped

  kafka:
    image: redpandadata/redpanda:v24.3.14
    container_name: tumlumtala-kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://tumlumtala-kafka:9092,external://localhost:29092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:28082
      - --advertise-pandaproxy-addr internal://tumlumtala-kafka:8082,external://localhost:28082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:28081
      - --rpc-addr tumlumtala-kafka:33145
      - --advertise-rpc-addr tumlumtala-kafka:33145
      - --mode dev-container
    ports:
      - "29092:29092"
      - "28082:28082"
      - "28081:28081"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - tumlumtala-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: redpandadata/redpanda:v24.3.14
    container_name: tumlumtala-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tumlumtala-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create \
          user.created user.updated user.deleted user.upserted \
          user.created.dlq user.updated.dlq user.deleted.dlq user.upserted.dlq \
          --brokers tumlumtala-kafka:9092 \
          --partitions 1 --replicas 1 2>&1 | grep -v "TOPIC_ALREADY_EXISTS" || true
        echo "✅ Kafka topics ready"
    restart: "no"

  kafka-console:
    image: redpandadata/console:v2.8.3
    container_name: tumlumtala-kafka-console
    environment:
      CONFIG_FILEPATH: /etc/kafka/console-config.yaml
    volumes:
      - ./kafka/console-config.yaml:/etc/kafka/console-config.yaml:ro
    ports:
      - "28080:8080"
    depends_on:
      - kafka
    networks:
      - tumlumtala-net
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  loki_data:
  grafana_data:
  kafka_data:

networks:
  tumlumtala-net:
    external: true
