services:
  redis:
    image: redis:8.4-alpine
    container_name: tumlumtala-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "26379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    networks:
      - tumlumtala-net

  rabbitmq:
    image: rabbitmq:4.1-alpine
    container_name: tumlumtala-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "25672:5672"  
      - "25673:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - tumlumtala-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: tumlumtala-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "29090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tumlumtala-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: tumlumtala-loki
    command: "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "23100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - tumlumtala-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tumlumtala-promtail
    command: "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - tumlumtala-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.0
    container_name: tumlumtala-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "23000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - tumlumtala-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: tumlumtala-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "24317:4317"
      - "24318:4318"
    networks:
      - tumlumtala-net
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  tumlumtala-net:
    external: true
