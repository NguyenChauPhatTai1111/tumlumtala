syntax = "proto3";

package auth;

option go_package = "github.com/tumlumtala/contracts/generated/auth;authpb";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}