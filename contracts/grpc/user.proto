syntax = "proto3";

package user;

option go_package = "github.com/tumlumtala/contracts/generated/user;userpb";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string fullname = 3;
}

message CreateUserResponse {
  string id = 1;
  string email = 2;
  string fullname = 3;
}