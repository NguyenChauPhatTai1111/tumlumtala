syntax = "proto3";

package user;

option go_package = "github.com/tumlumtala/contracts/generated/user;userpb";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string fullname = 3;
  string role = 4;
}

message CreateUserResponse {
  uint64 id = 1;
  string email = 2;
  string fullname = 3;
  string role = 4;
  string uuid = 5;
}

message User {
  uint64 id = 1;
  string email = 2;
  string fullname = 3;
  string created_at = 4;
  string updated_at = 5;
  string role = 6;
  string uuid = 7;
  string avatar = 8;
}

message GetUserRequest { string uuid = 1; }

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
}

message UpdateUserRequest {
  string uuid = 1;
  string email = 2;
  string fullname = 3;
  string role = 4;
  string avatar = 5;
}

message DeleteUserRequest { string uuid = 1; }
message DeleteUserResponse { bool deleted = 1; }
