syntax = "proto3";

package authorization;

option go_package = "github.com/tumlumtala/contracts/generated/authorization;authzpb";

service AuthorizationService {
  rpc Check(CheckRequest) returns (CheckResponse);
}

message CheckRequest {
  string user_uuid = 1;
  string service    = 2;
  string resource   = 3;
  string action     = 4;
}

message CheckResponse {
  bool   allowed = 1;
  string reason  = 2;
}
