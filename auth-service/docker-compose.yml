services:
  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    container_name: tumlumtala-auth-service
    env_file: .env
    environment:
      PORT: "${PORT:-25053}"
      DB_HOST: tumlumtala-users-mysql
      DB_PORT: "3306"
    networks:
      - tumlumtala-net
    restart: unless-stopped

networks:
  tumlumtala-net:
    external: true
