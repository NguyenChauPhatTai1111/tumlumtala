<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to Tumlumtala</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr>
              <td style="background:#0f766e;padding:24px 28px;color:#ffffff;">
                <h1 style="margin:0;font-size:24px;line-height:32px;font-weight:700;">Welcome to Tumlumtala</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:24px;">Hi {{.fullname}},</p>
                <p style="margin:0 0 16px;font-size:15px;line-height:24px;">Your account has been created successfully. You can now sign in and start using Tumlumtala.</p>
                <p style="margin:0 0 24px;font-size:15px;line-height:24px;">Account email: <strong>{{.email}}</strong></p>
                <p style="margin:0;font-size:13px;line-height:20px;color:#6b7280;">If you did not create this account, please ignore this message.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
