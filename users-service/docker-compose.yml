services:
  users-mysql:
    image: mysql:8.4
    container_name: tumlumtala-users-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tumlumtala_users}
      MYSQL_USER: ${DB_USER:-tumlum}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tala}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_HOST_PORT:-23306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - tumlumtala-net

  users-service:
    build:
      context: ..
      dockerfile: users-service/Dockerfile
    container_name: tumlumtala-users-service
    environment:
      PORT: ${PORT:-25052}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DB_HOST: tumlumtala-users-mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-tumlum}
      DB_PASSWORD: ${DB_PASSWORD:-tala}
      DB_NAME: ${DB_NAME:-tumlumtala_users}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_OUTPUT: ${LOG_OUTPUT:-json}
      TRACING_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-25052}:${PORT:-25052}"
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      users-mysql:
        condition: service_healthy
    networks:
      - tumlumtala-net

volumes:
  mysql_data:

networks:
  tumlumtala-net:
    external: true
